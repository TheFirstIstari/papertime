[tasks.data]
description = "Run the Darwin data pipeline (Rust darwin2data binary)"
run = "cargo run --release --manifest-path darwin2data/Cargo.toml"

[tasks.build]
description = "Build the SvelteKit static site (auto-runs data first)"
depends = ["data"]
run = "npm run build"

[tasks.dev]
description = "Start SvelteKit dev server"
run = "npm run dev"

[tasks.deploy]
description = "Commit data + push to GitHub → Render auto-deploys"
depends = ["build"]
run = """
git add static/
git commit -m 'update timetable data'
git push origin main
"""

[tasks.clean]
description = "Clean all build artifacts"
run = """
rm -rf darwin2data/target/
rm -rf pdf2data/target/
rm -rf .svelte-kit build node_modules
"""

[env]
DARWIN_S3_BUCKET = { age = "" }
DARWIN_S3_PREFIX = { age = "" }
DARWIN_S3_ACCESS_KEY = { age = "" }
DARWIN_S3_SECRET_KEY = { age = "" }
DARWIN_S3_REGION = { age = "" }
