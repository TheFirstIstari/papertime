# PaperTime — Render Blueprint
# https://render.com/docs/blueprint-spec
services:
  - type: static_site
    name: papertime
    repo: https://github.com/TheFirstIstari/papertime
    branch: main
    buildCommand: rm -rf .svelte-kit build node_modules/.cache && npm install --include=dev && npm run build
    publishPath: build
    autoDeploy: true
    domains:
      - papertime.tweak.wiki
    envVars: []
# Force rebuild
