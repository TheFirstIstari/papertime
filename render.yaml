# PaperTime — Render Blueprint
# https://render.com/docs/blueprint-spec
#
# Note: The data pipeline (darwin2data) runs locally via `mise run data`.
# The resulting JSON is committed to git. Render only builds the static site.
services:
  - type: static_site
    name: papertime
    repo: https://github.com/TheFirstIstari/papertime
    branch: main
    buildCommand: rm -rf .svelte-kit build node_modules/.cache && git lfs pull && python3 scripts/regen-marey.py && npm install --include=dev && npm run build
    publishPath: build
    autoDeploy: true
    domains:
      - papertime.tweak.wiki
    envVars: []
