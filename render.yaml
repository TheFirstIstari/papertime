# PaperTime — Render Blueprint
# https://render.com/docs/blueprint-spec
services:
  - type: static_site
    name: papertime
    repo: https://github.com/TheFirstIstari/papertime
    branch: main
    buildCommand: rm -rf node_modules .svelte-kit build && npm cache clean --force && npm install && npm run build
    publishPath: build
    autoDeploy: true
    domains:
      - papertime.tweak.wiki
    envVars: []
